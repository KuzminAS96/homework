<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form>
        <legend>Ваши личные данные</legend>
        <fieldset>
            <label>
                Ваше имя
                <input type="text" required placeholder="Имя">
            </label>
            <label>
                Ваш возраст
                <input type="number" required placeholder="Возраст">
            </label>
            <label>
                Ваш номер телефона
                <input type="tel" inputmode="tel" required placeholder="Номер телефона">
            </label>
            <label>
                Ваша почта
                <input type="email" name="email" inputmode="email" required placeholder="Почта">
            </label>
            <label>Сообщение</label>
            <textarea required name="massage" placeholder="Ваше сообщение"></textarea>
            <label>
                <input id="flag" type="checkbox" required>Я принимаю правила
            </label>
            <button type="submit">Отправить</button>
        </fieldset>
        





    </form>
</body>

</html>
